<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Counter Dzikir</title>
</head>
<header>
    <h1 align="center">Counter Dzikir</h1>
</header>
<body>
    <main>
        <section class="interface">
            <h2>Target Jumlah Dzikir:</h2>
            <h1>33</h1>            
            <h2>Jumlah Dzikir Hari Ini: </h2>
            <div class="counter">
                <h1 id="angka">0</h1>
            </div>
        </section>
        <section class="control">
            <button id="dzikir">Klik Aku Untuk Tambah</button>
            <button id="reset">Reset</button>
        </section>
        <div id="notify" class="noti">
            Target Tercapai!
        </div>
    </main>
    <script src="script.js"></script>
</body>
<footer><p>2026</p></footer>
</html>
