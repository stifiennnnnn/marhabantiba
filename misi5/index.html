<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Imsakiyah Ramadhan 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="../img/logo.png" width="100px" height="100px" alt="Logo Ramadhan">
        <h1>Jadwal Imsakiyah</h1>
    </header>

    <main class="container">
        <div class="controls">
            <label for="pilih-kota">Pilih Kota:</label>
            <select id="pilih-kota">
                <option value="1301">Kota Jakarta</option>
                <option value="1638">Kota Surabaya</option>
                <option value="0228">Kota Medan</option>
                <option value="1219">Kota Bandung</option>
                <option value="2622">Kota Makassar</option>
                <option value="1433">Kota Semarang</option>
                <option value="0412">Kota Pekanbaru</option>
                <option value="0506">Kota Batam</option>
                <option value="1107">Kota Tangerang</option>
                <option value="1225">Kota Depok</option>
            </select>
        </div>

        <div id="status-pesan"></div>

        <div class="table-wrapper">
            <table id="tabel-imsakiyah">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Imsak</th>
                        <th>Subuh</th>
                        <th>Dzuhur</th>
                        <th>Ashar</th>
                        <th>Maghrib</th>
                        <th>Isya</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
