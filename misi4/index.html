<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Shalat - To-Do List Ramadhan</title>
</head>
<body>
    <header>
        <div class="pala">
            <img src="../img/logo.png" width="100px" height="100px" alt="Logo Ramadhan">
            <h1 class="judul">To-Do List Ramadhan</h1>
            <button id="menu-mobile" class="menu-toggle">☰</button>
        </div>  
        <nav id="nav-list">
            <a href="index.html">Shalat</a>
            <a href="quran.html">Qur'an</a>
            <a href="puasa.html">Puasa</a>
            <a href="../misi2/index.html">Dzikir</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="summary-section">       
            <p>Ringkasan Progress Harian: <span id="global-progress-percent">0</span>%</p>
            <p>Status Motivasi: <span id="global-motivation-status">Ayo rajin melaksanakan shalat!</span></p>
        </div>

        <section id="halaman-shalat">
                <h2>Checklist Shalat Wajib</h2>
                <p>Selesaikan 5 waktu hari ini!</p>
                
                <div class="progress-outer">
                    <div id="shalat-bar-fill" class="progress-inner"></div>
                </div>
                <p class="stats">Terisi: <span id="shalat-count">0</span>/5 waktu (<span id="shalat-percent">0</span>%)</p>
                <div class="list-ibadah">
                    <label class="item-check">
                        <input type="checkbox" class="shalat-check" data-nama="Subuh">
                        Subuh
                    </label>
                    <label class="item-check">
                        <input type="checkbox" class="shalat-check" data-nama="Dzuhur">
                        Dzuhur
                    </label>
                    <label class="item-check">
                        <input type="checkbox" class="shalat-check" data-nama="Ashar">
                        Ashar
                    </label>
                    <label class="item-check">
                        <input type="checkbox" class="shalat-check" data-nama="Maghrib">
                        Maghrib
                    </label>
                    <label class="item-check">
                        <input type="checkbox" class="shalat-check" data-nama="Isya">
                        Isya
                    </label>
                </div>
                <button class="btn-reset" onclick="resetShalat()">Mulai Baru (Reset)</button>
        </section>
    </main>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Hapus Checklist?</h3>
            <p>Apakah kamu yakin ingin meriset semua progres shalat hari ini?</p>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="tutupModal()">Batal</button>
                <button class="btn-confirm" onclick="eksekusiReset()">Ya, Reset</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
<footer>
    <p>2026</p>
</footer>
</html>
